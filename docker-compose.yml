services:
  bot:
    build: .
    environment:
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
      - ./backgrounds:/app/backgrounds
      - ./fonts:/app/fonts
      - ./video:/app/video
      - ./config.json:/app/config.json:ro
    restart: unless-stopped
